<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Twitch & OBS Admin-Panel</title>

  <link rel="stylesheet" href="/admin.css">
</head>

<body>

<div class="admin-header">
  <div class="header-side left">
    <img src="/logo.png" class="admin-logo">
  </div>

  <div class="header-center">
    <h1 class="admin-title">Twitch & OBS Admin-Panel</h1>
  </div>

  <div class="header-side right">
    <img src="/logo.png" class="admin-logo">
  </div>
</div>

  <!-- PANEL -->
  <div id="panel">

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="economy">Economy</button>
      <button class="tab-btn" data-tab="sound">Sounds</button>
      <button class="tab-btn" data-tab="overlay-admin">Overlay</button>
      <button class="tab-btn" data-tab="raid">Raid</button>
      <button class="tab-btn" data-tab="duel">Duelle</button>

      <!-- Credits-Tab bleibt sichtbar, aber leer -->
      <button class="tab-btn" data-tab="credits-editor">Credits</button>

      <button class="tab-btn" data-tab="security">Für später</button>
    </div>

    <div id="economy" class="tab" style="display:block"></div>
    <div id="sound" class="tab" style="display:none"></div>
    <div id="overlay-admin" class="tab" style="display:none"></div>
    <div id="raid" class="tab" style="display:none"></div>
    <div id="duel" class="tab" style="display:none"></div>

    <!-- Credits-Tab bleibt leer -->
    <div id="credits-editor" class="tab" style="display:none">
      <p style="opacity:0.6; font-style:italic;">Credits werden später neu aufgebaut.</p>
    </div>

    <div id="security" class="tab" style="display:none"></div>

  </div>

  <!-- JAVASCRIPT -->
  <script src="/security.js"></script>

  <!-- Credits-Editor.js ENTFERNT -->

  <script src="/admin.js"></script>

  <script>
    window.addEventListener("load", () => {
      openTab('economy');
    });
  </script>

<script src="/economy.js"></script>

</body>
</html>
