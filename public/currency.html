<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Fuchsdukaten Overlay</title>
  <style>
    :root {
      --twitch-purple: #6441a5;
      --text-main: #ffd27f;
      --text-muted: #f5e1b8;
      --shadow: #000000;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      color: var(--text-main);
    }

    #wrapper {
      padding: 16px 20px;
      box-sizing: border-box;
    }

    #content {
      font-size: 24px;
      line-height: 1.4;
      text-shadow: 0 0 8px var(--shadow), 0 0 16px var(--shadow);
      white-space: pre-line;
    }

    .headline {
      font-size: 26px;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .subline {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .list {
      margin: 0;
      padding-left: 24px;
      font-size: 20px;
    }

    .list li {
      margin-bottom: 2px;
    }

    .status {
      font-size: 16px;
      color: var(--text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="content">Warte auf Daten…</div>
  </div>

  <script>
    const contentEl = document.getElementById('content');

    function setText(text) {
      contentEl.textContent = text;
    }

    function renderCurrencyUpdate(data) {
      // Einzelner User + Balance
      setText(`${data.user}: ${data.balance} Fuchsdukaten`);
    }

    function renderTopUpdate(data) {
      // Top-Liste schön formatiert
      if (!Array.isArray(data.list) || data.list.length === 0) {
        setText('Noch keine Fuchsdukaten-Daten verfügbar.');
        return;
      }

      let text = '🏆 Top Fuchsdukaten:\n\n';
      data.list.forEach((entry, i) => {
        text += `${i + 1}. ${entry.name} — ${entry.amount} FD\n`;
      });
      setText(text);
    }

    function createWebSocket() {
      const protocol = (location.protocol === 'https:') ? 'wss://' : 'ws://';
      const host = location.hostname || 'localhost';
      const port = 3000; // Dein Backend-Port
      const wsUrl = `${protocol}${host}:${port}`;

      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        // Optional: Status anzeigen, wenn du willst
        // setText('Verbunden, warte auf Daten…');
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }

        if (!data || !data.type) return;

        if (data.type === 'currencyUpdate') {
          renderCurrencyUpdate(data);
        } else if (data.type === 'topUpdate') {
          renderTopUpdate(data);
        }
      };

      ws.onerror = () => {
        // Fehler nicht ins Overlay schreien, einfach still bleiben
      };

      ws.onclose = () => {
        // Kleiner Reconnect nach kurzer Zeit
        setTimeout(createWebSocket, 3000);
      };
    }

    setText('Warte auf Daten…');
    createWebSocket();
  </script>
</body>
</html>
