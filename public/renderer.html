<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Credits Renderer</title>
  <style>
    @font-face {
      font-family: 'MAGNETOB';
      src: url('/fonts/MAGNETOB.TTF') format('truetype');
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: transparent;
      overflow: hidden;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }

    #viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: none;
      mask-image: linear-gradient(to bottom,
        transparent 0%, rgba(0,0,0,0.5) 6%, black 15%,
        black 85%, rgba(0,0,0,0.5) 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom,
        transparent 0%, rgba(0,0,0,0.5) 6%, black 15%,
        black 85%, rgba(0,0,0,0.5) 94%, transparent 100%);
    }

    #viewport.active { display: block; }

    #scroll-content {
      position: absolute;
      width: 100%;
      left: 0;
      text-align: center;
      padding: 80px 60px;
      will-change: transform;
    }

    /* Logo — nur max-height, Breite automatisch */
    .credits-logo {
      max-height: var(--logo-height, 120px);
      width: auto;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
    }

    /* Headline + Untertitel in MAGNETOB */
    .credits-headline {
      font-family: 'MAGNETOB', 'Segoe UI', sans-serif;
      font-weight: normal;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .credits-subtitle {
      font-family: 'MAGNETOB', 'Segoe UI', sans-serif;
      font-weight: normal;
      opacity: 0.85;
      white-space: pre-line;
      margin-bottom: 40px;
    }

    /* Kategorie-Titel in MAGNETOB */
    .credits-section { margin: 0 auto 20px; max-width: 800px; }

    .credits-section-title {
      font-family: 'MAGNETOB', 'Segoe UI', sans-serif;
      font-weight: normal;
      color: #9b7fd4;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    /* Namen in Standard-Schrift */
    .credits-names {
      font-family: 'Segoe UI', sans-serif;
      line-height: 2;
      opacity: 0.9;
    }

    /* Abschluss + Raid in MAGNETOB */
    .credits-farewell {
      font-family: 'MAGNETOB', 'Segoe UI', sans-serif;
      font-weight: normal;
      opacity: 0.9;
      white-space: pre-line;
      margin-top: 40px;
    }

    .credits-raid {
      font-family: 'MAGNETOB', 'Segoe UI', sans-serif;
      font-weight: normal;
      opacity: 0.9;
      white-space: pre-line;
      margin-top: 20px;
    }

    hr.credits-hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.2);
      margin: 8px auto;
      width: 60%;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="scroll-content"></div>
  </div>
  <script src="/renderer.js"></script>
</body>
</html>
