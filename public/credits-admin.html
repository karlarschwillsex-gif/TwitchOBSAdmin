<div style="max-width:1100px; margin:0 auto;">

<style>
  @font-face { font-family: 'MAGNETOB'; src: url('/fonts/MAGNETOB.TTF') format('truetype'); }
  .section-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#222;border:1px solid #333;border-radius:6px;margin-bottom:5px;}
  .section-item:hover{border-color:#555;}
  .section-move{background:#333;border:1px solid #555;color:#eee;width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .section-move:hover{background:#555;}
  .section-move:disabled{opacity:0.3;cursor:default;}
  .section-check{width:15px;height:15px;cursor:pointer;accent-color:#6441a5;}
  .section-label{flex:1;font-size:0.88em;}
  .section-type{font-size:0.72em;opacity:0.5;}
  .cr-haken{color:#9f9;font-size:1.1em;margin-left:4px;min-width:20px;display:inline-block;}
</style>

<div id="creditsStatus" class="msg" style="text-align:center; margin-bottom:10px;"></div>

<!-- START/STOP -->
<div class="econ-section">
  <div class="econ-title">Credits steuern</div>
  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <button id="creditsStartBtn" style="background:#2d7a2d;border:none;border-radius:6px;padding:10px 24px;color:#eee;cursor:pointer;font-size:1em;font-weight:bold;">▶ Starten</button>
    <button id="creditsStopBtn"  style="background:#7a2d2d;border:none;border-radius:6px;padding:10px 24px;color:#eee;cursor:pointer;font-size:1em;font-weight:bold;">⏹ Stoppen</button>
    <span id="creditsRunStatus" style="font-size:0.9em; opacity:0.7;">Status: unbekannt</span>
  </div>
</div>

<!-- TEXTE -->
<div class="econ-section">
  <div class="econ-title">Texte</div>
  <div class="econ-grid">
    <div class="econ-col">
      <div class="econ-row">
        <label class="econ-label">Headline</label>
        <input type="text" id="cr_headline" class="econ-input" style="width:100%;max-width:300px;" placeholder="z.B. FaireWelt">
        <span class="cr-haken" id="hk_headline"></span>
      </div>
      <div class="econ-row">
        <label class="econ-label">Untertitel</label>
        <textarea id="cr_subtitle" class="econ-input" style="width:100%;max-width:300px;height:56px;resize:vertical;"></textarea>
        <span class="cr-haken" id="hk_subtitle"></span>
      </div>
    </div>
    <div class="econ-col">
      <div class="econ-row">
        <label class="econ-label">Abschlusstext</label>
        <textarea id="cr_farewell" class="econ-input" style="width:100%;max-width:300px;height:56px;resize:vertical;"></textarea>
        <span class="cr-haken" id="hk_farewell"></span>
      </div>
      <div class="econ-row">
        <label class="econ-label">Raid-Text <span style="font-size:0.8em;opacity:0.6;">[Twitchname] = Platzhalter</span></label>
        <textarea id="cr_raidText" class="econ-input" style="width:100%;max-width:300px;height:56px;resize:vertical;"></textarea>
        <span class="cr-haken" id="hk_raidText"></span>
      </div>
    </div>
  </div>
</div>

<!-- RAID -->
<div class="econ-section">
  <div class="econ-title">Raid-Ziel</div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <input type="text" id="cr_raidTarget" class="econ-input" placeholder="Twitch-Name" style="width:200px;">
    <select id="cr_recentRaids" class="econ-input" style="width:auto;"><option value="">Letzte ▼</option></select>
    <button class="btn-save" id="cr_saveRaidBtn" style="padding:6px 14px;">Setzen</button>
    <span class="cr-haken" id="hk_raid"></span>
  </div>
</div>

<!-- SCHRIFT & FARBEN -->
<div class="econ-section">
  <div class="econ-title">Schrift & Farben</div>
  <div class="econ-grid">
    <div class="econ-col">
      <div class="econ-row">
        <label class="econ-label">Schriftart</label>
        <select id="cr_fontFamily" class="econ-input" style="width:100%;max-width:260px;">
          <optgroup label="Meine Schriftarten">
            <option value="MAGNETOB">MAGNETOB ✦</option>
          </optgroup>
          <optgroup label="System-Schriftarten">
            <option value="Segoe UI">Segoe UI</option>
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Impact">Impact</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
          </optgroup>
        </select>
        <span class="cr-haken" id="hk_fontFamily"></span>
      </div>
      <div class="econ-row">
        <label class="econ-label">Textfarbe</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="color" id="cr_textColorPicker" value="#ffffff" style="width:40px;height:32px;padding:2px;background:#222;border:1px solid #444;border-radius:4px;cursor:pointer;">
          <input type="text" id="cr_textColor" class="econ-input" value="#ffffff" style="width:90px;">
          <span class="cr-haken" id="hk_textColor"></span>
        </div>
      </div>
      <div class="econ-row">
        <label class="econ-label">Schattenfarbe</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="color" id="cr_shadowColorPicker" value="#000000" style="width:40px;height:32px;padding:2px;background:#222;border:1px solid #444;border-radius:4px;cursor:pointer;">
          <input type="text" id="cr_shadowColor" class="econ-input" value="#000000" style="width:90px;">
          <span class="cr-haken" id="hk_shadowColor"></span>
        </div>
      </div>
    </div>
    <div class="econ-col">
      <div class="econ-row"><label class="econ-label">Headline (px)</label><input type="number" id="cr_fontSizeHeadline" class="econ-input" value="64" style="width:80px;"><span class="cr-haken" id="hk_fontSizeHeadline"></span></div>
      <div class="econ-row"><label class="econ-label">Untertitel (px)</label><input type="number" id="cr_fontSizeSubtitle" class="econ-input" value="32" style="width:80px;"><span class="cr-haken" id="hk_fontSizeSubtitle"></span></div>
      <div class="econ-row"><label class="econ-label">Kategorie (px)</label><input type="number" id="cr_fontSizeCategory" class="econ-input" value="28" style="width:80px;"><span class="cr-haken" id="hk_fontSizeCategory"></span></div>
      <div class="econ-row"><label class="econ-label">Namen (px)</label><input type="number" id="cr_fontSizeNames" class="econ-input" value="22" style="width:80px;"><span class="cr-haken" id="hk_fontSizeNames"></span></div>
      <div class="econ-row">
        <label class="econ-label">Blur / Offset</label>
        <div style="display:flex;gap:6px;">
          <input type="number" id="cr_shadowBlur" class="econ-input" value="6" style="width:60px;"><span class="cr-haken" id="hk_shadowBlur"></span>
          <input type="number" id="cr_shadowOffset" class="econ-input" value="2" style="width:60px;"><span class="cr-haken" id="hk_shadowOffset"></span>
        </div>
      </div>
      <div class="econ-row"><label class="econ-label">Scroll-Speed</label><input type="number" id="cr_scrollSpeed" class="econ-input" value="0.8" step="0.1" min="0.1" max="20" style="width:80px;"><span class="cr-haken" id="hk_scrollSpeed"></span></div>
    </div>
  </div>
</div>

<!-- LOGOS -->
<div class="econ-section">
  <div class="econ-title">Logos</div>
  <div class="econ-grid">
    <div class="econ-col">
      <label class="econ-label">Logo oben</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <input type="text" id="cr_logo1" class="econ-input" placeholder="/logo.png" style="width:220px;">
        <input type="file" id="cr_logo1File" accept="image/*" style="font-size:0.8em;color:#aaa;">
        <span class="cr-haken" id="hk_logo1"></span>
      </div>
      <img id="cr_logo1Preview" style="max-height:50px;margin-top:6px;display:none;border:1px solid #444;border-radius:4px;">
    </div>
    <div class="econ-col">
      <label class="econ-label">Logo unten</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <input type="text" id="cr_logo2" class="econ-input" placeholder="/logo.png" style="width:220px;">
        <input type="file" id="cr_logo2File" accept="image/*" style="font-size:0.8em;color:#aaa;">
        <span class="cr-haken" id="hk_logo2"></span>
      </div>
      <img id="cr_logo2Preview" style="max-height:50px;margin-top:6px;display:none;border:1px solid #444;border-radius:4px;">
    </div>
  </div>
</div>

<!-- SEKTIONEN -->
<div class="econ-section">
  <div class="econ-title">Sektionen — Reihenfolge & Aktivierung</div>
  <div class="econ-info">↑↓ sortieren · Haken = aktiv</div>
  <div id="cr_sectionList" style="margin-top:10px;"></div>
</div>

<!-- SPEICHERN -->
<div class="econ-section">
  <div class="econ-save-wrapper">
    <button class="btn-save" id="cr_saveBtn">💾 Speichern</button>
    <button class="btn-save" id="cr_reloadBtn" style="background:#444;margin-left:8px;">🔄 Neu laden</button>
  </div>
</div>
