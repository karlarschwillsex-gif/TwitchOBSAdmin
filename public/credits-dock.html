<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Raid Credits</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      background:#18181b;
      color:#eee;
      font-family:'Segoe UI',sans-serif;
      font-size:13px;
      overflow:hidden;
      width:100%;
      height:100%;
    }

    .dock {
      display:flex;
      flex-direction:column;
      gap:5px;
      padding:6px;
    }

    /* Status */
    .status-row {
      display:flex;
      align-items:center;
      gap:5px;
      font-size:11px;
    }
    .dot {
      width:7px; height:7px; border-radius:50%;
      background:#9f9; flex-shrink:0;
    }
    .dot.running {
      background:#f66;
      box-shadow:0 0 4px #f66;
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { opacity:0.7; }

    /* Raid Zeile */
    .raid-row {
      display:flex;
      gap:4px;
      align-items:center;
    }
    #raidTarget {
      flex:1;
      padding:4px 7px;
      background:#222;
      border:1px solid #444;
      border-radius:4px;
      color:#eee;
      font-size:12px;
      min-width:0;
    }
    #raidTarget:focus { outline:none; border-color:#6441a5; }
    #recentSelect {
      padding:4px 2px;
      background:#222;
      border:1px solid #444;
      border-radius:4px;
      color:#eee;
      font-size:11px;
      cursor:pointer;
      width:28px;
    }

    /* Button Zeile */
    .btn-row {
      display:flex;
      gap:4px;
      align-items:center;
    }
    .btn-raid {
      flex:1;
      padding:5px 8px;
      background:#6441a5;
      border:none;
      border-radius:4px;
      color:#fff;
      font-size:12px;
      font-weight:bold;
      cursor:pointer;
      letter-spacing:0.5px;
    }
    .btn-raid:hover { background:#7b52c4; }

    /* Play Button rund */
    #playBtn {
      width:30px; height:30px;
      border-radius:50%;
      border:2px solid #9f9;
      background:#1a2e1a;
      color:#9f9;
      font-size:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:all 0.2s;
    }
    #playBtn.running {
      border-color:#f66;
      background:#2e1a1a;
      color:#f66;
      box-shadow:0 0 6px rgba(255,80,80,0.4);
    }
    #playBtn:hover { opacity:0.85; }

    /* Edit Button */
    #editBtn {
      width:28px; height:28px;
      background:#333;
      border:1px solid #555;
      border-radius:4px;
      color:#eee;
      font-size:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    #editBtn:hover { background:#444; }

    /* Status Meldung */
    #statusMsg {
      font-size:10px;
      color:#9f9;
      min-height:12px;
      text-align:center;
    }
    #statusMsg.error { color:#f66; }
  </style>
</head>
<body>
<div class="dock">

  <!-- Raid Eingabe -->
  <div class="raid-row">
    <input type="text" id="raidTarget" placeholder="Twitch-Name fürs Raid">
    <select id="recentSelect" title="Letzte Raids">
      <option value="">▼</option>
    </select>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-raid" id="saveRaidBtn">RAID SENDEN</button>
    <button id="playBtn" title="Credits starten">▶</button>
    <button id="editBtn" title="Editor öffnen">✎</button>
  </div>

  <!-- Status Meldung -->
  <div id="statusMsg"></div>

</div>

<script>
  var raidInput    = document.getElementById('raidTarget');
  var recentSelect = document.getElementById('recentSelect');
  var saveRaidBtn  = document.getElementById('saveRaidBtn');
  var playBtn      = document.getElementById('playBtn');
  var editBtn      = document.getElementById('editBtn');
  var statusDot    = document.getElementById('statusDot');
  var statusText   = document.getElementById('statusText');
  var statusMsg    = document.getElementById('statusMsg');
  var isRunning    = false;

  function setMsg(msg, isError) {
    statusMsg.textContent = msg || '';
    statusMsg.className   = isError ? 'error' : '';
    if (msg) setTimeout(function() { statusMsg.textContent = ''; statusMsg.className = ''; }, 3000);
  }

  function updateUI(running) {
    isRunning = running;
    if (running) {
      playBtn.textContent = '⏹';
      playBtn.className   = 'running';
      statusDot.className = 'dot running';
      statusText.textContent = 'Credits laufen';
    } else {
      playBtn.textContent = '▶';
      playBtn.className   = '';
      statusDot.className = 'dot';
      statusText.textContent = 'Credits gestoppt';
    }
  }

  function checkStatus() {
    fetch('/credits_api/status').then(function(r) { return r.json(); }).then(function(d) {
      updateUI(d.running || false);
    }).catch(function() {
      statusText.textContent = 'Verbindungsfehler';
    });
  }

  function loadRecent() {
    fetch('/credits_api/config').then(function(r) { return r.json(); }).then(function(cfg) {
      recentSelect.innerHTML = '<option value="">▼</option>';
      (cfg.recentRaidTargets || []).forEach(function(name) {
        var o = document.createElement('option');
        o.value = name; o.textContent = name;
        recentSelect.appendChild(o);
      });
      if (cfg.raidTarget) raidInput.value = cfg.raidTarget;
    }).catch(function() {});
  }

  recentSelect.onchange = function() {
    if (this.value) { raidInput.value = this.value; this.value = ''; }
  };

  saveRaidBtn.onclick = function() {
    var target = raidInput.value.trim();
    if (!target) { setMsg('Bitte Namen eingeben!', true); return; }
    fetch('/credits_api/raid', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ raidTarget: target })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) { setMsg('✅ Raid gespeichert!'); loadRecent(); }
      else setMsg('Fehler!', true);
    }).catch(function() { setMsg('Fehler!', true); });
  };

  playBtn.onclick = function() {
    var endpoint = isRunning ? '/credits_api/stop' : '/credits_api/start';
    fetch(endpoint, { method:'POST' }).then(function() {
      updateUI(!isRunning);
      setMsg(isRunning ? '⏹ Gestoppt' : '▶ Gestartet');
    }).catch(function() { setMsg('Fehler!', true); });
  };

  editBtn.onclick = function() {
    window.open('http://localhost:3000/admin.html', '_blank');
  };

  checkStatus();
  loadRecent();
  setInterval(checkStatus, 5000);
</script>
</body>
</html>
