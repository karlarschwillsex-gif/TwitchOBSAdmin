<div class="econ-col" style="max-width: 650px; margin: 0 auto; font-size: 0.9em;">

  <!-- Neuen Sound hinzufügen -->
  <div class="econ-section" style="text-align:center;">
    <div class="econ-title">Neuen Sound hinzufügen</div>

    <div class="econ-row" style="justify-content:center;">
      <label class="econ-label" style="width:150px;">Alias</label>
      <input type="text" id="aliasInput" class="econ-input" placeholder="z.B. !miau" style="width:200px;">
    </div>

    <div class="econ-row" style="justify-content:center;">
      <label class="econ-label" style="width:150px;">Sound‑Datei</label>
      <input type="file" id="soundFile" class="econ-input" style="width:200px; padding:4px;">
    </div>

    <div class="econ-row" style="justify-content:center;">
      <label class="econ-label" style="width:150px;">Kosten</label>
      <input type="number" id="costInput" class="econ-input" min="0" value="10" style="width:200px;">
    </div>

    <div class="econ-row" style="justify-content:center;">
      <label class="econ-label" style="width:150px;">Lautstärke (%)</label>
      <input type="number" id="volumeInput" class="econ-input" min="0" max="100" value="100" style="width:200px;">
    </div>

    <div class="econ-save-wrapper">
      <button class="btn-save" id="addSoundBtn">Sound hinzufügen</button>
    </div>
  </div>


  <!-- Vorhandene Sounds -->
  <div class="econ-section">
    <div class="econ-title">Vorhandene Sounds</div>

    <table style="width:100%; border-collapse: collapse; margin-top:10px; font-size:0.9em;">
      <thead>
        <tr style="border-bottom:1px solid #444;">
          <th style="padding:6px;">Befehl</th>
          <th style="padding:6px;">Lautstärke</th>
          <th style="padding:6px;">Kosten</th>
          <th style="padding:6px;">Aktion</th>
        </tr>
      </thead>
      <tbody id="soundTable"></tbody>
    </table>

    <div class="econ-save-wrapper" style="margin-top:20px;">
      <button class="btn-save" id="saveSoundListBtn">Änderungen speichern</button>
    </div>
  </div>

</div>

<script src="sound.js"></script>
