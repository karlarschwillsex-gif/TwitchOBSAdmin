<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Credits / RAID</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#18181b; color:#eee;
      font-family:'Segoe UI',sans-serif; font-size:13px;
      padding:8px; user-select:none;
    }
    .dock-title { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

    .raid-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
    #raidTarget {
      flex:1; padding:5px 8px; background:#222; border:1px solid #444;
      border-radius:4px; color:#eee; font-size:13px;
    }
    #raidTarget:focus { outline:none; border-color:#6441a5; }
    #recentSelect {
      padding:5px 4px; background:#222; border:1px solid #444;
      border-radius:4px; color:#eee; font-size:12px; cursor:pointer;
    }

    .btn-row { display:flex; gap:6px; margin-bottom:8px; align-items:center; }
    .btn-raid {
      flex:1; padding:6px 8px; background:#6441a5; border:none;
      border-radius:4px; color:#fff; font-size:12px; cursor:pointer; font-weight:bold;
    }
    .btn-raid:hover { background:#7b52c4; }

    /* Play/Stop Icon Button */
    #playBtn {
      width:36px; height:36px; border-radius:50%;
      border:2px solid #9f9; background:#1a2e1a;
      font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition: all 0.2s;
      color:#9f9;
    }
    #playBtn.running {
      border-color:#f66; background:#2e1a1a; color:#f66;
      box-shadow:0 0 8px rgba(255,80,80,0.4);
    }
    #playBtn:hover { opacity:0.85; }

    .btn-icon {
      width:32px; height:32px; background:#333; border:1px solid #555;
      border-radius:4px; color:#eee; font-size:15px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .btn-icon:hover { background:#444; }

    #status { font-size:11px; color:#9f9; min-height:16px; text-align:center; }
    #status.error { color:#f66; }
    .divider { border:none; border-top:1px solid #333; margin:6px 0; }

    /* Status Indikator */
    .status-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#555; }
    .status-dot.idle    { background:#9f9; box-shadow:0 0 4px #9f9; }
    .status-dot.running { background:#f66; box-shadow:0 0 4px #f66; animation:pulse 1.5s infinite; }
    .status-text { font-size:11px; opacity:0.7; }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50% { opacity:0.4; }
    }
  </style>
</head>
<body>

  <div class="dock-title">Credits / RAID</div>

  <!-- Status Indikator -->
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Prüfe Status…</span>
  </div>

  <!-- Raid-Eingabe -->
  <div class="raid-row">
    <input type="text" id="raidTarget" placeholder="Twitch-Name fürs Raid">
    <select id="recentSelect" title="Letzte Raid-Ziele">
      <option value="">▼</option>
    </select>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-raid" id="saveRaidBtn">RAID SENDEN</button>
    <button id="playBtn" title="Credits starten/stoppen">▶</button>
    <button class="btn-icon" id="editBtn" title="Credits bearbeiten">✎</button>
  </div>

  <hr class="divider">
  <div id="status"></div>

  <script>
    var raidInput    = document.getElementById('raidTarget');
    var recentSelect = document.getElementById('recentSelect');
    var saveRaidBtn  = document.getElementById('saveRaidBtn');
    var playBtn      = document.getElementById('playBtn');
    var editBtn      = document.getElementById('editBtn');
    var statusEl     = document.getElementById('status');
    var statusDot    = document.getElementById('statusDot');
    var statusText   = document.getElementById('statusText');

    var isRunning = false;

    function setStatus(msg, isError) {
      statusEl.textContent = msg || '';
      statusEl.className   = isError ? 'error' : '';
      if (msg) setTimeout(function() { statusEl.textContent = ''; }, 4000);
    }

    function updateUI(running) {
      isRunning = running;
      if (running) {
        playBtn.textContent  = '⏹';
        playBtn.className    = 'running';
        playBtn.title        = 'Credits stoppen';
        statusDot.className  = 'status-dot running';
        statusText.textContent = 'Credits laufen';
      } else {
        playBtn.textContent  = '▶';
        playBtn.className    = '';
        playBtn.title        = 'Credits starten';
        statusDot.className  = 'status-dot idle';
        statusText.textContent = 'Credits gestoppt';
      }
    }

    // ── Status prüfen ──
    function checkStatus() {
      fetch('/credits_api/status').then(function(r) { return r.json(); }).then(function(d) {
        updateUI(d.running || false);
      }).catch(function() {
        statusDot.className   = 'status-dot';
        statusText.textContent = 'Verbindungsfehler';
      });
    }

    // ── Letzte Raids laden ──
    function loadRecent() {
      fetch('/credits_api/config').then(function(r) { return r.json(); }).then(function(cfg) {
        var list = cfg.recentRaidTargets || [];
        recentSelect.innerHTML = '<option value="">▼</option>';
        list.forEach(function(name) {
          var opt = document.createElement('option');
          opt.value = name; opt.textContent = name;
          recentSelect.appendChild(opt);
        });
        if (cfg.raidTarget) raidInput.value = cfg.raidTarget;
      }).catch(function(){});
    }

    recentSelect.onchange = function() {
      if (this.value) { raidInput.value = this.value; this.value = ''; }
    };

    // ── Raid speichern ──
    saveRaidBtn.onclick = function() {
      var target = raidInput.value.trim();
      if (!target) { setStatus('Bitte Twitch-Name eingeben!', true); return; }
      fetch('/credits_api/raid', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ raidTarget: target })
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) { setStatus('✅ Raid-Ziel gespeichert!'); loadRecent(); }
        else setStatus('Fehler!', true);
      }).catch(function(e) { setStatus('Fehler!', true); });
    };

    // ── Play/Stop ──
    playBtn.onclick = function() {
      var endpoint = isRunning ? '/credits_api/stop' : '/credits_api/start';
      fetch(endpoint, { method:'POST' }).then(function() {
        updateUI(!isRunning);
        setStatus(isRunning ? '⏹ Gestoppt' : '▶ Gestartet');
      }).catch(function() { setStatus('Fehler!', true); });
    };

    // ── Editor öffnen ──
    editBtn.onclick = function() {
      window.open('http://localhost:3000/admin.html', '_blank');
    };

    // ── Init ──
    loadRecent();
    checkStatus();
    setInterval(checkStatus, 5000);
  </script>

</body>
</html>
